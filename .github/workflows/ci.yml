name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore dependencies
        run: dotnet restore ClinicaX.slnx

      - name: Build
        run: dotnet build ClinicaX.slnx --no-restore --configuration Release

      - name: Test
        run: dotnet test ClinicaX.Tests/ClinicaX.Tests.csproj --no-build --configuration Release --verbosity normal

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npx prettier --check src/

      - name: Test
        run: npx ng test --watch=false

      - name: Build
        run: npm run build -- --configuration production
