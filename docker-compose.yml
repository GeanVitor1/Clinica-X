services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: clinica-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD:-ClinicaX_ChangeMe!2024}"
    ports:
      - "1433:1433"
    volumes:
      - sqldata:/var/opt/mssql
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: clinica-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  api:
    build:
      context: ./src/backend
      dockerfile: Dockerfile
    container_name: clinica-api
    environment:
      - PORT=8080
      - ASPNETCORE_URLS=http://0.0.0.0:8080
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=ClinicaX;User Id=sa;Password=${MSSQL_SA_PASSWORD:-ClinicaX_ChangeMe!2024};TrustServerCertificate=True;MultipleActiveResultSets=true
      - ConnectionStrings__Redis=redis:6379
      - Jwt__Key=${JWT_KEY:-CHANGE-ME-clinica-x-prod-secret-key-min-32-chars!!}
      - Jwt__Issuer=ClinicaX
      - Jwt__Audience=ClinicaX
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT:-Production}
      - Seed__EnableDemo=${SEED_ENABLE_DEMO:-true}
      - Cors__Origins__0=http://localhost
      - Cors__Origins__1=http://localhost:80
      - Cors__Origins__2=http://localhost:4200
      - Cors__AllowVercelPreviews=true
    ports:
      - "5000:8080"
    depends_on:
      - sqlserver
      - redis
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: src/frontend/Dockerfile
    container_name: clinica-web
    ports:
      - "80:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  sqldata:
}