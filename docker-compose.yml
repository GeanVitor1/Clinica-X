services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: clinica-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "ClinicaX@2024"
    ports:
      - "1433:1433"
    volumes:
      - sqldata:/var/opt/mssql
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: clinica-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  api:
    build:
      context: ./src/backend
      dockerfile: Dockerfile
    container_name: clinica-api
    environment:
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=ClinicaX;User Id=sa;Password=ClinicaX@2024;TrustServerCertificate=True;MultipleActiveResultSets=true
      - ConnectionStrings__Redis=redis:6379
      - Jwt__Key=clinica-x-super-secret-key-2024-at-least-32-chars!
      - Jwt__Issuer=ClinicaX
      - Jwt__Audience=ClinicaX
      - ASPNETCORE_ENVIRONMENT=Development
    ports:
      - "5000:8080"
    depends_on:
      - sqlserver
      - redis
    restart: unless-stopped

  web:
    build:
      context: ./src/frontend
      dockerfile: Dockerfile
    container_name: clinica-web
    ports:
      - "80:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  sqldata:
