<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <title>ClinicaX — Gestão Inteligente para Clínicas</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#9db4d2">
  <meta name="description" content="Sistema de gestão inteligente para clínicas odontológicas e médicas. Agenda, prontuário, financeiro e WhatsApp integrados.">
  <meta name="color-scheme" content="light dark">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <link rel="preload" href="assets/icon-sprite.svg" as="fetch" crossorigin="anonymous">
  <script>
    (function() {
      var theme = localStorage.getItem('clx-theme');
      if (!theme) {
        // Default: soft blue light (matches product brand)
        theme = 'light';
      }
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>
</head>
<body>
  <app-root></app-root>
</body>
</html>
