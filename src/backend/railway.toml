# Railway → Root Directory: src/backend
# Não precisa de variáveis obrigatórias: sobe com SQLite + JWT auto + demo.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
numReplicas = 1
